<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Green Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    /* Header */
    .header {
      background: #f0fdf4;
      border-bottom: 1px solid #bbf7d0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #16a34a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #15803d;
    }

    .header-text p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }

    .body { padding: 14px 16px; }

    /* Status card */
    .status-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .status-label {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active   { background: #16a34a; }
    .status-dot.inactive { background: #9ca3af; }
    .status-dot.warning  { background: #d97706; }

    .status-text {
      font-size: 12px;
      color: #374151;
      line-height: 1.4;
    }

    /* Score mini display */
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
    }

    .score-bubble {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }

    .score-info h3 {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .score-info p {
      font-size: 11px;
      color: #6b7280;
    }

    /* Section divider */
    .divider {
      height: 1px;
      background: #f3f4f6;
      margin: 12px 0;
    }

    /* Quick links */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .quick-links { display: flex; flex-direction: column; gap: 4px; }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      text-decoration: none;
      color: #374151;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-size: 12px;
      font-family: inherit;
    }

    .quick-link:hover { background: #f3f4f6; }

    .quick-link-icon {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .icon-green  { background: #f0fdf4; }
    .icon-blue   { background: #eff6ff; }
    .icon-amber  { background: #fffbeb; }
    .icon-purple { background: #faf5ff; }

    .quick-link span { flex: 1; }
    .quick-link-arrow { color: #d1d5db; font-size: 14px; }

    /* Supported sites */
    .sites {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .site-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid #e5e7eb;
      color: #6b7280;
    }

    .site-badge.active {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #15803d;
      font-weight: 600;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f3f4f6;
      text-align: center;
      font-size: 10px;
      color: #d1d5db;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🌿</div>
    <div class="header-text">
      <h1>Green Assistant</h1>
      <p>Sustainable shopping helper</p>
    </div>
  </div>

  <div class="body">

    <!-- Current page status -->
    <div class="status-card">
      <div class="status-label">Current page</div>
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">Checking page...</div>
      </div>
      <!-- Score row shown only on product pages -->
      <div class="score-row" id="score-row" style="display:none">
        <div class="score-bubble" id="score-bubble">—</div>
        <div class="score-info">
          <h3 id="score-title">—</h3>
          <p id="score-subtitle">Sustainability score</p>
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="section-title">Quick actions</div>
    <div class="quick-links">
      <button class="quick-link" id="btn-open-sidebar">
        <div class="quick-link-icon icon-green">🌱</div>
        <span>Show green sidebar</span>
        <span class="quick-link-arrow">›</span>
      </button>
      <button class="quick-link" id="btn-amazon">
        <div class="quick-link-icon icon-blue">🔍</div>
        <span>Search sustainable products</span>
        <span class="quick-link-arrow">›</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Supported sites -->
    <div style="margin-top:12px;">
    <div style="font-size:10px;font-weight:700;color:#6b7280;margin-bottom:6px;">SUPPORTED WEBSITES</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;">
      <span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 8px;border-radius:99px;font-size:11px;">Amazon.in ✓</span>
      <span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 8px;border-radius:99px;font-size:11px;">Amazon.com ✓</span>
      <span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 8px;border-radius:99px;font-size:11px;">Flipkart ✓</span>
      <span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 8px;border-radius:99px;font-size:11px;">Etsy ✓</span>
      <span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 8px;border-radius:99px;font-size:11px;">Google Shopping ✓</span>
    </div>
    </div>
  </div>

  <div class="footer">Green Assistant MVP · Phase 1</div>

  <script src="popup.js"></script>
</body>
</html>
